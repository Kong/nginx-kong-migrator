# 1. Base Ingress (Connectivity & Headers)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: test-headers
  namespace: defaults
  annotations:
    # Snippet headers -> Request/Response Transformers
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header X-Injected-Header "FullCoverage";
      more_set_headers "X-Response-Header: True";
    # Body size (request-size-limiting)
    nginx.ingress.kubernetes.io/proxy-body-size: "5m"
    # Keepalive (global warning check)
    nginx.ingress.kubernetes.io/upstream-keepalive-connections: "50"
spec:
  ingressClassName: kong
  rules:
  - host: coverage.example.com
    http:
      paths:
      - path: /api/headers
        pathType: Prefix
        backend:
          service:
            name: echo-v1
            port:
              number: 80

