# 10. CORS & IP Restriction
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: test-security
  namespace: defaults
  annotations:
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://trusted.com"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST"
    nginx.ingress.kubernetes.io/whitelist-source-range: "10.0.0.0/24, 192.168.1.0/24"
spec:
  ingressClassName: kong
  rules:
  - host: coverage.example.com
    http:
      paths:
      - path: /api/security
        pathType: Prefix
        backend:
          service:
            name: echo-v1
            port:
              number: 80

