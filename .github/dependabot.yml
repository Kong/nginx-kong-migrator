version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    cooldown:
      semver-patch-days: 3
      semver-minor-days: 7
      semver-major-days: 30
    labels:
      - "github_actions"

  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "daily"
    cooldown:
      semver-patch-days: 3
      semver-minor-days: 7
      semver-major-days: 30
    labels:
      - "dependencies"
