name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  lint:
    uses: ./.github/workflows/lint.yml

  test:
    uses: ./.github/workflows/test.yml

  build:
    needs: [lint, test]
    uses: ./.github/workflows/build.yml
    with:
      goos: '["linux"]'
      goarch: '["amd64"]'

  smoke-test:
    needs: build
    uses: ./.github/workflows/smoke-test.yml
