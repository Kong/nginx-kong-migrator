name: Build (reusable)

on:
  workflow_call:
    inputs:
      goos:
        type: string
        default: '["linux","darwin"]'
      goarch:
        type: string
        default: '["amd64","arm64"]'

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        goos: ${{ fromJson(inputs.goos) }}
        goarch: ${{ fromJson(inputs.goarch) }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          set -eo pipefail
          VERSION=$(echo "${GITHUB_REF_NAME}" | tr '/' '-')
          BINARY_BASE="migrator_${VERSION}_${GOOS}_${GOARCH}"

          mkdir -p dist
          go build -ldflags="-X main.Version=${VERSION}" -o "dist/${BINARY_BASE}" ./main.go

          (cd dist && tar -czf "${BINARY_BASE}.tar.gz" "${BINARY_BASE}")

          rm "dist/${BINARY_BASE}"

      - name: Upload artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error
