name: Smoke Test (reusable)

on:
  workflow_call:

permissions:
  contents: read

jobs:
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Download linux-amd64 artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: linux-amd64

      - name: List downloaded files (Debugging)
        run: ls -R

      - name: Extract and run version check
        run: |
          TAR=$(ls *.tar.gz)
          tar -xzf "$TAR"
          BINARY="${TAR%.tar.gz}"
          chmod +x "$BINARY"
          ./"$BINARY" version
